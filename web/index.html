<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHiking - 등산 사진 지도</title>
    <link rel="stylesheet" href="style.css">
    <script src=""></script>
    <script src=""></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <h1>MyHiking</h1>
        <div id="headerControls">
            <span id="photoCount"></span>
            <button id="btnSwitchMap" title="지도 전환">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/>
                    <line x1="8" y1="2" x2="8" y2="18"/>
                    <line x1="16" y1="6" x2="16" y2="22"/>
                </svg>
                <span id="mapProviderLabel">네이버 지도</span>
            </button>
        </div>
    </header>

    <!-- Drop Zone Overlay -->
    <div id="dropOverlay">
        <div id="dropContent">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17,8 12,3 7,8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p>사진을 여기에 드롭하세요</p>
        </div>
    </div>

    <!-- Map Container -->
    <div id="mapContainer">
        <div id="naverMap" class="map-view active"></div>
        <div id="googleMap" class="map-view"></div>
    </div>

    <!-- Upload Panel -->
    <div id="uploadPanel">
        <label id="uploadLabel" for="fileInput">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21,15 16,10 5,21"/>
            </svg>
            <span>사진 선택 또는 드래그&드롭</span>
        </label>
        <input type="file" id="fileInput" accept="image/*" multiple hidden>
    </div>

    <!-- Loading Indicator -->
    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <span>사진을 분석하고 있습니다...</span>
    </div>

    <!-- Photo List Panel (Bottom Sheet) -->
    <div id="photoPanel" class="hidden">
        <div id="photoPanelHeader">
            <div>
                <h2 id="mountainName"></h2>
                <p id="mountainInfo"></p>
            </div>
            <button id="btnClosePanel">&times;</button>
        </div>
        <div id="photoGrid"></div>
    </div>

    <!-- Photo Viewer Modal -->
    <div id="photoViewer" class="hidden">
        <button id="btnCloseViewer">&times;</button>
        <img id="viewerImage" src="" alt="사진">
        <div id="viewerInfo"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
